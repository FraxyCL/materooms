// Función para guardar puntaje en Supabase
async function saveScoreToLeaderboard(nombre, puntaje) {
    try {
        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/leaderboard`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({
                    nombre: nombre,
                    puntaje: puntaje
                })
            }
        );
        if (response.ok) {
            return { success: true, message: "¡Puntaje guardado!" };
        } else {
            return { success: false, message: "Error al guardar el puntaje" };
        }
    } catch (error) {
        console.error("Error:", error);
        return { success: false, message: "Error de conexión" };
    }
}

function parseLevel(levelText){
    rooms = {};
    const lines = levelText.trim().split("\n");
    const totalRows = lines.length;
    const totalCols = lines[0].length;
    mapWidth = totalCols / 5;
    mapHeight = totalRows / 3;

    for(let roomRow=0; roomRow<mapHeight; roomRow++){
        for(let roomCol=0; roomCol<mapWidth; roomCol++){
            const r1 = lines[roomRow * 3]?.substr(roomCol * 5, 5);
            const r2 = lines[roomRow * 3 + 1]?.substr(roomCol * 5, 5);
            const r3 = lines[roomRow * 3 + 2]?.substr(roomCol * 5, 5);
            const roomId = r2[1] + r2[2];
            rooms[roomId] = {
                roomId: roomId,
                level: r1[4],
                row: roomRow,
                col: roomCol,
                clockImage:
                    r1[1] === "r"
                        ? Math.floor(Math.random() * totalClockImages) + 1
                        : null,
                objectPosition:
                    r1[1] === "r"
                        ? getRandomPositionInSafeArea()
                        : null,
                north:
                    r1[2] == "T"
                        ? "|"
                        : r1[2],
                left:
                    r2[0] == "T"
                        ? "-"
                        : r2[0],
                right:
                    r2[4] == "T"
                        ? "-"
                        : r2[4],
                south:
                    r3[2] == "T"
                        ? "|"
                        : r3[2],
                hasClock:
                    r1[1] === "r",
                hasChest:
                    r1[3] === "c",
                equationData:null,
                chestImage:
                    r1[3] === "c"
                        ? Math.floor(Math.random() * totalChestImages) + 1
                        : null,
                chestPosition:
                    r1[3] === "c"
                        ? getRandomPositionInSafeArea()
                        : null,
                chestCompleted: false,
                hasExit:
                    r2[3] === "S",
                    exitUnlocked: false,
                    exitEquationData: null,
                difficulty:
                    r3[0],
                hasHint:
                    r3[1] === "p",
                hintImage:
                    r3[1] === "p"
                        ? Math.floor(Math.random() * totalHintImages) + 1
                        : null,
                hintPage:
                    r3[1] === "p"
                        ? Math.floor(Math.random() * totalHintPages) + 1
                        : null,
                hintPosition:
                    r3[1] === "p"
                        ? getRandomPositionInSafeArea()
                        : null,
                hasTransition:
                    r3[3] === "t",
                transitionUnlocked: false,
                transitionEquationData: null,
                transitionDirection:
                    r1[2] == "T" ? "up" :
                    r2[0] == "T" ? "left" :
                    r2[4] == "T" ? "right" :
                    r3[2] == "T" ? "down" :
                    null,
                isStart: r3[4] === "I"
            };
            if (
                rooms[roomId].hasChest
            ) {
                const pool = equationPools[rooms[roomId].difficulty
                    ];
                const randomEquation = pool[Math.floor(Math.random() * pool.length
                    )
                    ];
                rooms[roomId].equationData = structuredClone(randomEquation
                    );
            }
            if (
                rooms[roomId].hasExit
            ) {
                const pool =equationPools[rooms[roomId].difficulty
                    ];
                const randomEquation = pool[Math.floor(Math.random() * pool.length
                    )
                    ];
                rooms[roomId].exitEquationData = structuredClone(randomEquation
                    );
            }
            if (
                rooms[roomId].hasTransition
            ) {
                const pool =equationPools[rooms[roomId].difficulty
                    ];
                const randomEquation = pool[Math.floor(Math.random() * pool.length
                    )
                    ];
                rooms[roomId].transitionEquationData = structuredClone(randomEquation
                    );
            }
        }
    }
}

function parseEquationPool(text){
    return text.trim().split("\n").map(line=>{
            const parts = line.split("|");
            return{
                id:parts[0],
                equation:parts[1],
                solutions:parts[2]
            };
        });
}

function findStartRoom(){
    for(const roomId in rooms){
        if(rooms[roomId].isStart){
            return roomId;
        }
    }
    return Object.keys(rooms)[0];
}

function getNeighbor(roomId,direction){
    const room = rooms[roomId];
    let targetRow = room.row;
    let targetCol = room.col;
    if(direction === "up")
        targetRow--;
    if(direction === "down")
        targetRow++;
    if(direction === "left")
        targetCol--;
    if(direction === "right")
        targetCol++;
    for(const id in rooms){
        const candidate = rooms[id];
        if(
            candidate.row === targetRow && candidate.col === targetCol
        ){
            return id;
        }
    }
    return null;
}

function move(direction){
    const room =
        rooms[currentRoom];
    let allowed = false;
    if(
        direction === "up" && room.north === "|"
    ){
        allowed = true;
    }
    if(
        direction === "down" && room.south === "|"
    ){
        allowed = true;
    }
    if(
        direction === "left" && room.left === "-"
    ){
        allowed = true;
    }
    if(
        direction === "right" && room.right === "-"
    ){
        allowed = true;
    }
    if (
        room.hasTransition && !room.transitionUnlocked && room.transitionDirection == direction
    ) {
        showMessage("La puerta está bloqueada."
        );
        return;
    }
    if(!allowed)
        return;
    const destination = getNeighbor(currentRoom,direction
        );
    if(destination === null)
        return;
    playSound(sfx.footsteps);
    currentRoom = destination;
    document.getElementById("messageBox").textContent = "";
    loadRoomImage(currentRoom, function(){
    updateArrows();
});
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if(remainingTime > 0){
            remainingTime--;
            updateClockDisplay();
            // Cuando quedan 30 segundos
            if(
                remainingTime <= 30 &&
                !heartbeatStarted
            ){
                heartbeatStarted = true;
                stopMusic();
                heartbeatMusic.currentTime = 0;
                heartbeatMusic.play();
            }
        }
        if(remainingTime <= 0){
            gameOver();
        }
    },1000);
}

function formatTime(seconds){
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return (
        String(minutes).padStart(2,"0")
        + ":"
        + String(secs).padStart(2,"0")
    );
}

function renderEquation(text){
    return text.replace(
        /\^(\d+)/g,
        "<sup>$1</sup>"
    );
}

function openEquation(roomId,type,onSuccess,onFail){
    activeEquationRoom = roomId;
    activeEquationType = type;
    equationSuccessCallback = onSuccess;
    equationFailCallback = onFail;
    const room = rooms[roomId];
    let equationData;
    switch(type){
        case "chest":
            equationData = room.equationData;
            break;
        case "exit":
            equationData = room.exitEquationData;
            break;
        case "transition":
            equationData = room.transitionEquationData;
            break;
    }
    activeEquationData = equationData;
    if (type == "exit") {
        document.getElementById("difficultyText").textContent ="Desbloquear salida (Dificultad "+ room.difficulty + ")";
    }
    else if (type == "transition") {
        document.getElementById("difficultyText").textContent ="Desbloquear paso (Dificultad "+ room.difficulty + ")";
    }
    else {
        document.getElementById("difficultyText").textContent ="Ecuación dificultad "+ room.difficulty;
    }
    document.getElementById("equationText").innerHTML = renderEquation(equationData.equation);
    document.getElementById("solution1").value="";
    document.getElementById("solution2").value="";
    document.getElementById("solution1").disabled=false;
    document.getElementById("solution2").disabled=false;
    noSolutionSelected=false;
    document.getElementById("noSolutionButton").classList.remove("activeNoSolution");
    document.getElementById("taskOverlay").style.display="flex";
}
function normalizeSolution(value){
    return value.trim().replace(/\s/g,"");
}

function parseMathValue(value){
    value = value.trim().replace(/\s/g,"");
    if(value === "")
        return NaN;
    // Si es una fracción (ej: 6/4)
    if(value.includes("/")){
        const partes = value.split("/");
        if(partes.length !== 2)
            return NaN;
        const numerador = Number(partes[0]);
        const denominador = Number(partes[1]);
        if(isNaN(numerador) || isNaN(denominador) || denominador === 0)
            return NaN;
        return numerador / denominador;
    }
    // Decimal o entero
    return Number(value);
}

function checkEquationAnswer(){
    const solutionString = activeEquationData.solutions;
    if(solutionString === "NONE"){
        return noSolutionSelected;
    }
    if(noSolutionSelected)
        return false;
    const soluciones = solutionString.split(",");
    const respuesta1 = parseMathValue(document.getElementById("solution1").value);
    const respuesta2 = parseMathValue(document.getElementById("solution2").value);
    const solucion1 = parseMathValue(soluciones[0]);
    const solucion2 = parseMathValue(soluciones[1]);
    const EPS = 0.000001;
    function iguales(a,b){
        return Math.abs(a-b) < EPS;
    }
    // Caso: raíz doble.
    // Basta con escribirla en cualquiera de las dos casillas.
    if(iguales(solucion1, solucion2)){
        return (
            (!isNaN(respuesta1) && iguales(respuesta1, solucion1)) || (!isNaN(respuesta2) && iguales(respuesta2, solucion1))
        );
    }
    // Para dos raíces distintas sí deben existir ambas respuestas.
    if(isNaN(respuesta1) || isNaN(respuesta2)){
        return false;
    }
    return (
        (iguales(respuesta1, solucion1) && iguales(respuesta2, solucion2)) || (iguales(respuesta1, solucion2) && iguales(respuesta2, solucion1))
    );
}

function playRandomErrorSound(){
    // Con cordura 1 el siguiente error produce Game Over, por lo que no se reproduce ningún sonido.
    if(sanity <= 1)
        return;

    let totalSounds = 0;
    switch(sanity){
        case 5:
            totalSounds = totalErrorSounds5;
            break;
        case 4:
            totalSounds = totalErrorSounds4;
            break;
        case 3:
            totalSounds = totalErrorSounds3;
            break;
        case 2:
            totalSounds = totalErrorSounds2;
            break;
        default:
            return;
    }
    const randomSound =
        Math.floor(Math.random() * totalSounds) + 1;
    // Si todavía estaba sonando uno anterior, detenerlo
    if (currentErrorSound) {
        currentErrorSound.pause();
        currentErrorSound.currentTime = 0;
    }
    currentErrorSound = new Audio(
        `audio/sfx/error${sanity}-${randomSound}.mp3`
    );
    //volumen errores
    currentErrorSound.volume = 0.7;
    currentErrorSound.play();
}

function getRandomGameOverImage(){
    let totalImages = 1;
    switch(currentLevel){
        case 1:
            totalImages = totalGameOverImages1;
            break;
        case 2:
            totalImages = totalGameOverImages2;
            break;
        case 3:
            totalImages = totalGameOverImages3;
            break;
        case 4:
            totalImages = totalGameOverImages4;
            break;
    }
    const randomImage = Math.floor(Math.random() * totalImages) + 1;
    return `imagenes/gameover${currentLevel}-${randomImage}.jpg`;
}

function stopSound(sound){

    sound.currentTime=0;

function returnToMenu(){
    secretLevelActive = false;
    scoreRegistered = false;
    const registerButton = document.getElementById("registerScoreButton");
    registerButton.style.display = "block";
    registerButton.disabled = false;
    clearInterval(timerInterval);
    stopMusic();
    stopGlitching();
    heartbeatMusic.pause();
    heartbeatMusic.currentTime = 0;
    heartbeatStarted = false;
    stopSound(sfx.clock);
    if (currentErrorSound) {
        currentErrorSound.pause();
        currentErrorSound.currentTime = 0;
        currentErrorSound = null;
    }
    currentLevel = startingLevel;
    score = 0;
    updateScoreDisplay();
    sanity = maxSanity;
    updateSanityDisplay();
    document.getElementById("game").style.display ="none";
    document.getElementById("gameOverScreen").style.display ="none";

    document.getElementById("menu").style.display = "block";

    activeEquationType = null;

    equationSuccessCallback = null;

function transitionToLevel(nextLevel){
    const fade = document.getElementById("fadeOverlay"
        );
    fade.style.pointerEvents = "auto";
    // Oscurecer
    fade.style.opacity = "1";
    stopGlitching();
    setTimeout(function(){
        recoverSanity(sanityRecoveryPerLevel);
        if (secretLevelActive) {
            loadLevel(1);
        }
        else {
            loadLevel(nextLevel);
        }
        if (sanity == 1) {startGlitching();}
        // Aclarar
        fade.style.opacity = "0";
        setTimeout(function(){fade.style.pointerEvents ="none";
        },2500);
    },2500);
}

function transitionToGame(){
    const fade = document.getElementById("fadeOverlay");
    fade.style.pointerEvents = "auto";
    // Comenzar completamente transparente
    fade.style.opacity = "0";
    // Forzar el renderizado antes de iniciar la transición
    requestAnimationFrame(() => {
        fade.style.opacity = "1";
        // Esperar a que termine de oscurecer
        setTimeout(function(){
            startGame();
            // Volver a aclarar
            fade.style.opacity = "0";
            setTimeout(function(){
                fade.style.pointerEvents = "none";
            },2500);
        },2500);
    });
}

function triggerGlitch(){
    playSound(sfx.glitch);
    const overlay = document.getElementById("glitchOverlay");
    overlay.style.opacity = "0.55";
    overlay.style.backgroundPosition = Math.random()*500 + "px " + Math.random()*500 + "px";
    scene.style.transform = "translate(" + (Math.random()*14-7) + "px," + (Math.random()*8-4) + "px)";
    scene.style.filter = "contrast(1.5) brightness(1.2) saturate(2)";
    setTimeout(function(){
        overlay.style.opacity="0";
        scene.style.transform="";
        scene.style.filter="";
    },150);
}

function startGlitching(){
    if(glitchInterval)
        return;
    function nextGlitch(){
        triggerGlitch();
        glitchInterval = setTimeout( nextGlitch, 1000 + Math.random()*1000
        );
    }
    glitchInterval = setTimeout(nextGlitch, 1000 + Math.random()*1000
    );
}

function stopGlitching(){clearTimeout(glitchInterval); glitchInterval = null;
}

    const leaderboardData = await fetchLeaderboard();
    const contentDiv = document.getElementById("leaderboardContent");
    contentDiv.innerHTML = ""; // Limpiar
    if (leaderboardData.length === 0) {
        contentDiv.innerHTML = "<p style='text-align: center; color: #999;'>Aún no hay puntajes registrados</p>";
        return;
    }    
    leaderboardData.forEach((entry, index) => {
        const entryDiv = document.createElement("div");
        entryDiv.style.cssText = `
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: ${index === 0 ? '#FFD700' : index === 1 ? '#C0C0C0' : index === 2 ? '#CD7F32' : '#f5f5f5'};
            border-radius: 8px;
            font-weight: ${index < 3 ? 'bold' : 'normal'};
            font-size: 18px;
        `;
        const posicion = document.createElement("span");
        posicion.textContent = `#${index + 1}`;
        posicion.style.fontWeight = "bold";
        const nombre = document.createElement("span");
        nombre.textContent = entry.nombre;
        nombre.style.flex = "1";
        nombre.style.marginLeft = "15px";
        const puntaje = document.createElement("span");
        puntaje.textContent = entry.puntaje;
        puntaje.style.fontWeight = "bold";
        entryDiv.appendChild(posicion);
        entryDiv.appendChild(nombre);
        entryDiv.appendChild(puntaje);
        contentDiv.appendChild(entryDiv);
    });
};
